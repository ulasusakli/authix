version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: authix_db
    restart: always
    environment:
      POSTGRES_USER: authix
      POSTGRES_PASSWORD: authix123
      POSTGRES_DB: authix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: